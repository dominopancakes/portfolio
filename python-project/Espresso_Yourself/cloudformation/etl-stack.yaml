AWSTemplateFormatVersion: 2010-09-09
Description: >
  ETL Lmabda Stack

Parameters:
  TeamName:
    Type: String
    Description: Enter your team name in format 'team-name' to customise the way your resources are named
    Default: espresso-yourself
  NetworkStackName:
    Type: String
    Default: project-networking
    Description: Network stack with VPC containing Redshift instance

Resources:
  EtlLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${TeamName}-etl-lambda-stack'
      Runtime: python3.12
      Handler: mystery_shop_etl_lambda.lambda_handler
      Role: !Sub 'arn:aws:iam::${AWS::AccountId}:role/lambda-execution-role'
      Timeout: 30
      ReservedConcurrentExecutions: 10
      # CHANGE THIS TO S3 LOCATION:
      Code:
        S3Bucket: espresso-yourself-deployment-bucket
        S3Key: lambda_function.zip
      VpcConfig:
        SecurityGroupIds:
          - Fn::ImportValue: !Sub '${NetworkStackName}-VPCSGID'
        SubnetIds:
          - Fn::ImportValue: !Sub '${NetworkStackName}-PrivateSubnet0ID'
      Tags:
        - Key: Name
          Value: !Sub '${TeamName}-etl-lambda-stack'
      Environment:
        Variables:
          SSM_PARAMETER_NAME:
            Fn::Join:
            - '_'
            - Fn::Split:
              - '-'
              - !Sub '${TeamName}_redshift_settings'
                EtlLambdaStackBucket: # Renamed from ShopperRawDataBucket
    Type: AWS::S3::Bucket
    DependsOn:
      - EtlLambdaStackBucketPermission
      - EtlLambdaFunction
    Properties:
      BucketName: !Sub '${TeamName}-etl-lambda-stack' # Updated bucket name
      PublicAccessBlockConfiguration: # do not allow any public access
        BlockPublicAcls: True
        BlockPublicPolicy: True
        IgnorePublicAcls: True
        RestrictPublicBuckets: True
      NotificationConfiguration: # trigger the lambda when a file is put in
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Function: !GetAtt EtlLambdaFunction.Arn
      Tags:
        - Key: Name
          Value: !Sub '${TeamName}-etl-lambda-stack'

  EtlLambdaStackBucketPermission: # Renamed logical ID
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref EtlLambdaFunction
      Principal: s3.amazonaws.com
      SourceArn: !Sub 'arn:aws:s3:::${TeamName}-etl-lambda-stack' # Updated source ARN

  EtlLambdaStackBucketPolicy: # Renamed logical ID
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref EtlLambdaStackBucket
      PolicyDocument:
        Statement:
          - Sid: "AllowSSLRequestsOnly"
            Action: "s3:*"
            Principal: "*"
            Effect: "Deny" # Block if...
            Resource:
              - !Sub "arn:aws:s3:::${TeamName}-etl-lambda-stack" # Updated resource ARN
              - !Sub "arn:aws:s3:::${TeamName}-etl-lambda-stack/*" # Updated resource ARN
            Condition:
              Bool:
                aws:SecureTransport: "false" # ...the request is not HTTPS
